services:
  backend:
    build:
      context: ./backend
    container_name: trading-simulator-backend
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://127.0.0.1:8000
    container_name: trading-simulator-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
